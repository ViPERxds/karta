  <script>
    (function() {
      const script = document.createElement('script');
      const keyParam = API_KEY ? `&apikey=${encodeURIComponent(API_KEY)}` : '';
      script.src = `https://api-maps.yandex.ru/2.1/?lang=ru_RU${keyParam}`;
      script.onload = () => {
        if (window.ymaps) {
          ymaps.ready(init);
        } else {
          console.error('Yandex Maps JS API not loaded');
        }
      };
      document.head.appendChild(script);
    })();

    // Построение выпуклой оболочки (Graham scan) вокруг массива [lat, lon]
    function buildConvexHull(points) {
      // Копируем и сортируем по lon, потом по lat
      const pts = points.map(p => [p[0], p[1]]).sort((a, b) => a[1] === b[1] ? a[0] - b[0] : a[1] - b[1]);
      if (pts.length <= 3) return pts;

      const cross = (o, a, b) => (a[1] - o[1]) * (b[0] - o[0]) - (a[0] - o[0]) * (b[1] - o[1]);

      const lower = [];
      for (const p of pts) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) {
          lower.pop();
        }
        lower.push(p);
      }

      const upper = [];
      for (let i = pts.length - 1; i >= 0; i--) {
        const p = pts[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) {
          upper.pop();
        }
        upper.push(p);
      }

      upper.pop();
      lower.pop();
      return lower.concat(upper);
    }

    function init() {
      const map = new ymaps.Map('map', {
        center: MAP_CENTER,
        zoom: 13,
        controls: ['zoomControl', 'fullscreenControl']
      });

      const panel = document.getElementById('panel');
      panel.innerHTML = '';

      const colors = ['#D7263D','#1B9AAA','#3F88C5','#F49D37','#4CAF50','#9C27B0','#795548','#E91E63','#009688','#607D8B'];
      const allCoords = [];

      Object.keys(ROUTES).sort((a,b)=>Number(a)-Number(b)).forEach((rid, idx) => {
        const r = ROUTES[rid];
        const color = colors[idx % colors.length];

        const points = r.items.map(p => [p.lat, p.lon]);
        points.forEach(p => allCoords.push(p));

        // Пешеходный маршрут по дорогам
        const multiRoute = new ymaps.multiRouter.MultiRoute(
          {
            referencePoints: points,
            params: {
              routingMode: 'pedestrian'
            }
          },
          {
            wayPointDraggable: false,
            routeStrokeColor: color.replace('#', ''),
            routeStrokeWidth: 4,
            routeActiveStrokeWidth: 5
          }
        );
        map.geoObjects.add(multiRoute);

        // Зона маршрута: строим выпуклую оболочку (convex hull) вокруг точек маршрута,
        // чтобы получить произвольную фигуру, охватывающую все дома.
        if (points.length >= 3) {
          const hull = buildConvexHull(points);
          const polygon = new ymaps.Polygon([hull], {
            hintContent: `${r.name}`,
            balloonContent: `${r.name}<br/>Адресов: ${r.count}<br/>Подъездов: ${r.entrances}`
          }, {
            fillColor: color + '33',
            strokeColor: color,
            strokeWidth: 2
          });
          map.geoObjects.add(polygon);
        }

        // Точки домов
        r.items.forEach(p => {
          const placemark = new ymaps.Placemark(
            [p.lat, p.lon],
            {
              balloonContentHeader: `${p.seq}. ${p.title}`,
              balloonContentBody: `Подъезды: ${p.entrances}`
            },
            {
              preset: 'islands#redDotIcon',
            }
          );
          map.geoObjects.add(placemark);
        });

        const routeDiv = document.createElement('div');
        routeDiv.className = 'route';
        routeDiv.innerHTML = `
          <h3>${r.name}
            <span class="badge">адресов: ${r.count}</span>
            <span class="badge">подъезды: ${r.entrances}</span>
          </h3>
          <a class="btn" target="_blank" rel="noopener" href="${r.yandex_link}">Открыть в Яндекс Навигаторе (отдельное окно)</a>
        `;
        panel.appendChild(routeDiv);
      });

      if (allCoords.length) {
        const bounds = ymaps.geoQuery(allCoords.map(c => new ymaps.Placemark(c))).getBounds();
        if (bounds) {
          map.setBounds(bounds, { checkZoomRange: true, zoomMargin: 40 });
        }
      }
    }
  </script>
